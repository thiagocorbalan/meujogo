# Production overrides - use with: docker compose -f docker-compose.yml -f docker-compose.production.yml up
services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes: []
    environment:
      NODE_ENV: production
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    volumes: []
    environment:
      NODE_ENV: production
    restart: always
    depends_on:
      api:
        condition: service_healthy

  postgres:
    ports: []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    restart: always
