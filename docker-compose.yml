services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: meujogo-api
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    volumes:
      - ./api:/app
      - /app/node_modules
      - ./api/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - meujogo-network

  app:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    container_name: meujogo-app
    ports:
      - '4000:4000'
    env_file: .env
    environment:
      PORT: 4000
      API_BASE_URL: ${API_BASE_URL:-http://api:3000}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:3000}
    volumes:
      - ./app:/app
      - /app/node_modules
      - /app/.nuxt
    depends_on:
      - api
    networks:
      - meujogo-network

  postgres:
    image: postgres:16-alpine
    container_name: meujogo-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meujogo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meujogo}
      POSTGRES_DB: ${POSTGRES_DB:-meujogo_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-meujogo} -d ${POSTGRES_DB:-meujogo_db}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - meujogo-network

volumes:
  postgres_data:

networks:
  meujogo-network:
    driver: bridge
